<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f17; color: #e0e0e0; padding: 40px; max-width: 600px; margin: 0 auto; }
    h1 { color: #a78bfa; margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 24px; font-size: 14px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #999; margin-bottom: 6px; font-weight: 600; }
    input { width: 100%; padding: 10px 12px; background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 6px; color: #e0e0e0; font-size: 14px; }
    input:focus { outline: none; border-color: #6d28d9; }
    button { padding: 10px 24px; background: #6d28d9; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    button:hover { background: #7c3aed; }
    .saved { color: #4ade80; font-size: 13px; margin-top: 12px; display: none; }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 16px; color: #a78bfa; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>TOR2MEGA Settings</h1>
  <p class="desc">Configure your backend connection and authentication token.</p>

  <div class="section">
    <h2>Connection</h2>
    <div class="field">
      <label for="api-url">Backend API URL</label>
      <input type="text" id="api-url" placeholder="http://localhost:3000">
    </div>
    <div class="field">
      <label for="api-token">API Token (JWT)</label>
      <input type="text" id="api-token" placeholder="Paste your JWT token here">
    </div>
    <button id="save">Save Settings</button>
    <div class="saved" id="saved">Settings saved successfully!</div>
  </div>

  <div class="section">
    <h2>How to get your token</h2>
    <p class="desc">
      1. Open the TOR2MEGA dashboard<br>
      2. Login with your email and password<br>
      3. Go to Settings → API Token<br>
      4. Copy the token and paste it above
    </p>
  </div>

  <script src="options.js"></script>
</body>
</html>
