<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f17; color: #e0e0e0; }
    .header { background: #6d28d9; padding: 14px 16px; display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 16px; font-weight: 700; color: white; }
    .header .logo { width: 20px; height: 20px; }
    .menu { padding: 8px; }
    .menu-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
    .menu-item:hover { background: #1a1a2e; }
    .menu-icon { width: 18px; height: 18px; flex-shrink: 0; color: #a78bfa; }
    .menu-text { font-size: 14px; font-weight: 500; }
    .menu-badge { margin-left: auto; background: #6d28d9; color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; min-width: 18px; text-align: center; }
    .divider { height: 1px; background: #1a1a2e; margin: 4px 12px; }
    .status-bar { padding: 8px 16px 12px; font-size: 11px; color: #555; text-align: center; }
    .status-ok { color: #4ade80; }
    .status-processing { color: #60a5fa; }
    .status-error { color: #f87171; }
    .no-token { text-align: center; padding: 24px 16px; }
    .no-token a { color: #a78bfa; text-decoration: none; }
    .no-token p { color: #888; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../assets/icon.svg" class="logo" alt="logo">
    <h1>TOR2MEGA</h1>
  </div>
  <div id="no-token" class="no-token" style="display:none">
    <p>No API token configured.</p>
    <a href="#" id="open-options">Open Settings</a>
  </div>
  <div id="main" style="display:none">
    <div class="menu">
      <div class="menu-item" id="action-add">
        <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span class="menu-text">Add to Library</span>
      </div>
      <div class="menu-item" id="action-library">
        <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
        <span class="menu-text">Open Library</span>
      </div>
      <div class="menu-item" id="action-dashboard">
        <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span class="menu-text">Open Dashboard</span>
      </div>
      <div class="divider"></div>
      <div class="menu-item" id="action-queue">
        <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="menu-text">Downloads Queue</span>
        <span class="menu-badge" id="queue-badge" style="display:none">0</span>
      </div>
    </div>
    <div class="status-bar" id="status-bar">Ready</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
